spring.application.name=api

# ==========================================================
# Profile ativo.
#  - Local (dev): fica em "local" por padrão (usa o Docker).
#  - Produção (EC2): sobrescreva com a variável SPRING_PROFILES_ACTIVE=prod
# ==========================================================
spring.profiles.active=local

# ---- Configuração COMUM aos dois ambientes ----
spring.datasource.driver-class-name=org.postgresql.Driver

aws.region=us-east-2
aws.bucket.name=eventostec-imagens-mateusvitorferreira

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
