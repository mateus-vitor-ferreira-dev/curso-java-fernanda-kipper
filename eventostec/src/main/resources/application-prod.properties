# ==========================================================
# Ambiente PRODUÇÃO (EC2) — RDS
# ==========================================================
# As propriedades abaixo leem variáveis de ambiente. Há MAIS DE UMA FORMA de
# fornecê-las ao ativar o profile "prod". Escolha a que preferir:
#
# 1) Variáveis de ambiente (recomendado):
#      export SPRING_PROFILES_ACTIVE=prod
#      export DB_URL="jdbc:postgresql://<endpoint-rds>:5432/postgres"
#      export DB_USERNAME="postgres"
#      export DB_PASSWORD="<senha>"
#      java -jar app.jar
#
# 2) Argumentos de linha de comando:
#      java -jar app.jar --spring.profiles.active=prod \
#           --spring.datasource.url="jdbc:postgresql://<endpoint-rds>:5432/postgres" \
#           --spring.datasource.username=postgres \
#           --spring.datasource.password=<senha>
#
# 3) Propriedades de sistema (-D):
#      java -Dspring.profiles.active=prod -DDB_URL=... -DDB_USERNAME=... -DDB_PASSWORD=... -jar app.jar
#
# 4) Arquivo externo (não versionado) ao lado do .jar:
#      coloque um application-prod.properties preenchido na mesma pasta do jar;
#      o Spring Boot carrega configuração externa automaticamente e ela tem
#      prioridade sobre a de dentro do jar.
#
# Em TODOS os casos a senha nunca fica no código versionado (o repositório é público).
# ==========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
